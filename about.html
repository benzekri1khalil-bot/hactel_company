<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Digiva</title>
<link rel="stylesheet" href="digiva.css"/>
<style>
.page-hero{background:var(--grad);padding:64px 0 48px;text-align:center}
.page-hero h1{font-size:clamp(28px,4vw,48px);font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:12px}
.page-hero p{font-size:16px;color:rgba(255,255,255,.7);max-width:520px;margin:0 auto}
.content-wrap{max-width:820px;margin:0 auto;padding:56px 24px}
.prose h2{font-size:22px;font-weight:800;color:var(--text);margin:36px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.prose h3{font-size:16px;font-weight:700;color:var(--text2);margin:20px 0 8px}
.prose p{font-size:15px;color:var(--text3);line-height:1.8;margin-bottom:14px}
.prose ul{padding-left:20px;margin-bottom:14px}
.prose ul li{font-size:15px;color:var(--text3);line-height:1.8;margin-bottom:6px}
.prose a{color:var(--d5)}
.about-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:40px 0}
.about-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center}
.about-ic{font-size:36px;margin-bottom:12px}
.about-card h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.about-card p{font-size:13px;color:var(--text3);line-height:1.6}
.support-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:32px}
.donate-box{background:linear-gradient(135deg,rgba(240,180,41,.08),rgba(46,156,255,.08));border:1px solid rgba(240,180,41,.3);border-radius:16px;padding:28px;text-align:center}
.donate-ic{font-size:48px;margin-bottom:12px}
.donate-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px}
.donate-desc{font-size:14px;color:var(--text3);line-height:1.7;margin-bottom:20px}
.donate-amounts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.donate-amt{padding:8px 18px;border-radius:8px;background:rgba(46,156,255,.1);border:1px solid rgba(46,156,255,.2);color:var(--d5);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.donate-amt:hover,.donate-amt.selected{background:var(--d5);color:#fff;border-color:var(--d5)}
</style>
</head>
<body>
<div id="toast-container"></div>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a class="site-logo" href="index.html">
      <div class="site-logo-mark">D</div>
      <span class="site-logo-text">Digiva</span>
    </a>
    <a class="site-nav-link" href="index.html">Home</a>
    <a class="site-nav-link" href="index.html#gen">Generator</a>
    <a class="site-nav-link" href="login.html">Sign In</a>
  </div>
</nav>

<!-- Content rendered by JS based on URL -->
<div id="page-content"></div>

<footer style="background:var(--bg2);border-top:1px solid var(--border);padding:32px 0;margin-top:60px">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
    <div style="font-size:13px;color:var(--text3)">© 2025 Digiva · AI Product Datasheets</div>
    <div style="display:flex;gap:20px">
      <a href="about.html" style="font-size:13px;color:var(--text3);text-decoration:none">About</a>
      <a href="privacy.html" style="font-size:13px;color:var(--text3);text-decoration:none">Privacy</a>
      <a href="terms.html" style="font-size:13px;color:var(--text3);text-decoration:none">Terms</a>
      <a href="support.html" style="font-size:13px;color:var(--text3);text-decoration:none">Support</a>
    </div>
  </div>
</footer>

<script src="digiva-core.js"></script>
<script>
const page = window.location.pathname.split('/').pop().replace('.html','');

const PAGES = {

about: `
<div class="page-hero">
  <div class="container">
    <div style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:12px">About Us</div>
    <h1>What is Digiva?</h1>
    <p>We build AI tools that save time for IT professionals, distributors, and tech vendors around the world.</p>
  </div>
</div>
<div class="content-wrap">
  <div class="prose">
    <h2>Our Story</h2>
    <p>Digiva was founded in Algeria by Khalil Benzekri, a networking technician and technology professional who saw a real problem: creating professional product datasheets was taking hours of work — researching specs, formatting tables, designing layouts — when it should take seconds.</p>
    <p>We built Digiva to solve that. Enter any product model number and get a complete, professional A4 datasheet in under 30 seconds. The AI researches the specifications, writes the introduction, builds the tables, and exports a ready-to-use PowerPoint file.</p>
    <h2>Our Mission</h2>
    <p>To give every IT distributor, reseller, and technology vendor access to enterprise-grade documentation tools — at a price that makes sense for their business.</p>
    <div class="about-grid">
      <div class="about-card"><div class="about-ic">⚡</div><h3>Speed</h3><p>What took hours now takes 30 seconds. Powered by GPT-4o and our custom datasheet engine.</p></div>
      <div class="about-card"><div class="about-ic">🎯</div><h3>Accuracy</h3><p>AI pulls real specifications from official manufacturer sources. No made-up data.</p></div>
      <div class="about-card"><div class="about-ic">🌍</div><h3>Global</h3><p>5 languages. Works for any product type. Trusted by IT professionals worldwide.</p></div>
    </div>
    <h2>Contact</h2>
    <p>For all inquiries: <a href="mailto:benzekri1khalil@gmail.com">benzekri1khalil@gmail.com</a></p>
    <p>For enterprise pricing, white-label, or partnership inquiries please reach out directly.</p>
  </div>
</div>`,

privacy: `
<div class="page-hero">
  <div class="container">
    <h1>Privacy Policy</h1>
    <p>Last updated: January 2025</p>
  </div>
</div>
<div class="content-wrap">
  <div class="prose">
    <h2>1. Information We Collect</h2>
    <p>When you register for Digiva, we collect your name, email address, and password (stored as a secure hash). We do not collect payment information — all payments are processed by third-party providers (Gumroad, Lemon Squeezy) who have their own privacy policies.</p>
    <h2>2. How We Use Your Information</h2>
    <ul>
      <li>To create and manage your account</li>
      <li>To process your credit purchases and track usage</li>
      <li>To send transactional emails (account confirmation, support replies)</li>
      <li>To improve our service based on usage patterns</li>
    </ul>
    <h2>3. Data Storage</h2>
    <p>Your account data is currently stored in your browser's local storage. This means your data is stored on your own device. We do not operate external servers that store your personal information.</p>
    <h2>4. OpenAI API</h2>
    <p>When you generate a datasheet, your product query is sent to OpenAI's API to generate content. This is subject to OpenAI's privacy policy at openai.com/privacy. We do not store the content of your generations on our servers.</p>
    <h2>5. Cookies</h2>
    <p>We use session storage to keep you logged in during your browser session. We do not use advertising cookies or third-party tracking cookies.</p>
    <h2>6. Third-Party Services</h2>
    <p>We use the following third-party services: OpenAI (AI generation), Gumroad / Lemon Squeezy (payment processing). Each has their own privacy policy which governs their handling of your data.</p>
    <h2>7. Your Rights</h2>
    <ul>
      <li>Right to access: You can view all your data in your dashboard</li>
      <li>Right to deletion: Contact us to delete your account and all associated data</li>
      <li>Right to correction: Update your information at any time in your profile</li>
    </ul>
    <h2>8. Children's Privacy</h2>
    <p>Digiva is not directed at children under 13. We do not knowingly collect data from children.</p>
    <h2>9. Changes to This Policy</h2>
    <p>We may update this policy from time to time. Continued use of the service after changes constitutes acceptance.</p>
    <h2>10. Contact</h2>
    <p>For privacy questions: <a href="mailto:benzekri1khalil@gmail.com">benzekri1khalil@gmail.com</a></p>
  </div>
</div>`,

terms: `

  </div>
</div>`,

support: `
<div class="page-hero">
  <div class="container">
    <h1>Support & Donations</h1>
    <p>We are here to help. Reach out anytime.</p>
  </div>
</div>
<div class="content-wrap">
  <div class="support-grid">
    <div>
      <div class="card">
        <div style="font-size:24px;margin-bottom:10px">💬</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px">Send a Message</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:16px">We typically reply within 24 hours.</div>
        <div class="inp-group"><label class="inp-label">Your Name</label><input class="inp" id="sup-name" placeholder="Your full name"/></div>
        <div class="inp-group"><label class="inp-label">Email</label><input class="inp" id="sup-email" type="email" placeholder="your@email.com"/></div>
        <div class="inp-group"><label class="inp-label">Subject</label><input class="inp" id="sup-sub" placeholder="What do you need help with?"/></div>
        <div class="inp-group"><label class="inp-label">Message</label><textarea class="inp" id="sup-msg" rows="5" style="resize:vertical" placeholder="Describe your issue..."></textarea></div>
        <button class="btn btn-primary" onclick="sendSupportMsg()">Send Message</button>
        <div id="sup-sent" style="display:none;margin-top:12px;color:var(--green);font-size:13px">✅ Message sent! We will reply to your email soon.</div>
      </div>
      <div class="card" style="margin-top:20px">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">📧 Direct Contact</div>
        <div style="font-size:13px;color:var(--text3)">For urgent inquiries or enterprise questions:</div>
        <a href="mailto:benzekri1khalil@gmail.com" style="font-size:14px;color:var(--d5);display:block;margin-top:6px">benzekri1khalil@gmail.com</a>
      </div>
    </div>
    <div>
      <div class="donate-box">
        <div class="donate-ic">❤️</div>
        <div class="donate-title">Support Digiva</div>
        <div class="donate-desc">Digiva is built by one person to help IT professionals worldwide. If this tool saves you time and helps your business, consider supporting its development. Every contribution helps keep the service running and improving.</div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">Choose an amount:</div>
        <div class="donate-amounts">
          <div class="donate-amt" onclick="selectDonate(this,'5')">$5</div>
          <div class="donate-amt selected" onclick="selectDonate(this,'10')">$10</div>
          <div class="donate-amt" onclick="selectDonate(this,'25')">$25</div>
          <div class="donate-amt" onclick="selectDonate(this,'50')">$50</div>
        </div>
        <button class="btn btn-primary btn-full" onclick="doDonate()">❤️ Support Digiva</button>
        <div style="font-size:11px;color:var(--text3);margin-top:12px">Payments processed securely. Thank you for your support.</div>
      </div>
      <div class="card" style="margin-top:20px">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">🚀 What your support funds</div>
        <ul style="list-style:none">
          <li style="font-size:13px;color:var(--text3);padding:6px 0;display:flex;gap:8px"><span>⚡</span>Server and API costs</li>
          <li style="font-size:13px;color:var(--text3);padding:6px 0;display:flex;gap:8px"><span>🔨</span>New features and improvements</li>
          <li style="font-size:13px;color:var(--text3);padding:6px 0;display:flex;gap:8px"><span>🌍</span>More language support</li>
          <li style="font-size:13px;color:var(--text3);padding:6px 0;display:flex;gap:8px"><span>📱</span>Mobile app development</li>
        </ul>
      </div>
    </div>
  </div>
</div>`

};

// Render the correct page
const content = PAGES[page] || PAGES['about'];
document.getElementById('page-content').innerHTML = content;
document.title = 'Digiva — ' + (page.charAt(0).toUpperCase() + page.slice(1));

function sendSupportMsg(){
  const name=document.getElementById('sup-name')?.value.trim();
  const email=document.getElementById('sup-email')?.value.trim();
  const sub=document.getElementById('sup-sub')?.value.trim();
  const msg=document.getElementById('sup-msg')?.value.trim();
  if(!name||!email||!msg){showToast('Please fill in all fields','err');return;}
  saveMessage(name,email,sub||'Support Request',msg);
  document.getElementById('sup-sent').style.display='block';
  showToast('Message sent ✓','ok');
}

let donateAmt='10';
function selectDonate(el,amt){
  document.querySelectorAll('.donate-amt').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  donateAmt=amt;
}
function doDonate(){
  const cfg=getCfg();
  const link=cfg.donateLink||'';
  if(link&&link.startsWith('http')){window.open(link+'?amount='+donateAmt,'_blank');return;}
  showToast('Donation link not configured yet. Contact benzekri1khalil@gmail.com','ok');
}
</script>
</body>
</html>
