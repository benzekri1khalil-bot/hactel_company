<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HACTEL — Sign In</title>
<script src="hactel-core.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0A0800;color:#F5F0E8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:hidden;position:relative}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#toast-container{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.wrap{position:relative;z-index:1;width:100%;max-width:440px;animation:fadeUp .5s ease}
.card{background:rgba(15,12,3,.97);border:1px solid rgba(201,160,48,.35);border-radius:24px;padding:44px 40px;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(201,160,48,.12),0 40px 100px rgba(0,0,0,.8)}
.logo-area{text-align:center;margin-bottom:32px}
.logo-img{height:80px;filter:drop-shadow(0 0 20px rgba(201,160,48,.4));display:block;margin:0 auto 12px}
.logo-name{font-family:'Poppins',sans-serif;font-size:26px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#C9A030,#FFE89A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:12px;color:#8A7A5A;margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.ig{margin-bottom:16px}
.il{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8A7A5A;margin-bottom:7px;display:block}
.inp{width:100%;padding:13px 16px;border:1.5px solid rgba(201,160,48,.2);border-radius:11px;font-size:14px;font-family:inherit;background:rgba(10,8,0,.8);color:#F5F0E8;outline:none;transition:all .2s}
.inp:focus{border-color:#C9A030;box-shadow:0 0 0 3px rgba(201,160,48,.1)}
.inp::placeholder{color:#4A3A1A}
.err{font-size:12px;color:#EF4444;padding:9px 14px;background:rgba(239,68,68,.08);border-radius:9px;border-left:3px solid #EF4444;display:none;margin-bottom:14px}
.err.on{display:block}
.btn-main{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#8B6A00,#C9A030,#E8B84B);color:#0A0800;margin-top:6px;box-shadow:0 6px 24px rgba(201,160,48,.35);transition:all .2s;font-family:inherit}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(201,160,48,.5)}
.hint{font-size:11px;color:#5A4A2A;text-align:center;margin-top:14px;line-height:1.7}
.hint span{color:#C9A030;font-weight:600}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:#4A3A1A;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(201,160,48,.15)}
.manager-btn{width:100%;padding:12px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;background:rgba(201,160,48,.08);border:1px solid rgba(201,160,48,.2);color:#C9A030;transition:all .2s;font-family:inherit}
.manager-btn:hover{background:rgba(201,160,48,.15)}
.cursor-dot{position:fixed;pointer-events:none;z-index:99999;width:12px;height:12px;border-radius:50%;background:rgba(201,160,48,.5);transform:translate(-50%,-50%);transition:left .04s,top .04s}
</style>
</head>
<body>
<canvas id="bgc"></canvas>
<div class="cursor-dot" id="dot"></div>
<div class="wrap">
 <div class="card">
  <div class="logo-area">
   <img class="logo-img" id="logoImg" src="" alt="HACTEL" onerror="this.style.display='none'"/>
   <div class="logo-name">HACTEL</div>
   <div class="logo-sub">Internal Tools Platform</div>
  </div>

  <div class="ig"><label class="il">Email or Username</label><input class="inp" id="l-id" type="text" placeholder="email@hactel.com or username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()"/></div>
  <div class="ig"><label class="il">Password</label><input class="inp" id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
  <div class="err" id="l-err"></div>
  <button class="btn-main" onclick="doLogin()">Sign In →</button>

  <div class="divider">or quick access</div>
  <button class="manager-btn" onclick="managerLogin()">👔 Manager Access (Hacene)</button>

  <div class="hint">Need access? Contact <span>benzekri1khalil@gmail.com</span></div>
 </div>
</div>

<script>
// Background canvas
(function(){
  const c=document.getElementById('bgc'),ctx=c.getContext('2d');
  function sz(){c.width=innerWidth;c.height=innerHeight;}sz();addEventListener('resize',sz);
  const bs=Array.from({length:18},()=>({x:Math.random()*1400,y:Math.random()*900,r:20+Math.random()*80,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,a:.02+Math.random()*.06}));
  function draw(){ctx.clearRect(0,0,c.width,c.height);bs.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=`rgba(201,160,48,${b.a})`;ctx.fill();b.x+=b.vx;b.y+=b.vy;if(b.x<-b.r)b.x=c.width+b.r;if(b.x>c.width+b.r)b.x=-b.r;if(b.y<-b.r)b.y=c.height+b.r;if(b.y>c.height+b.r)b.y=-b.r;});requestAnimationFrame(draw);}draw();
})();
const dot=document.getElementById('dot');document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';});

// Load HACTEL logo
try {
  if(typeof IMG_HACTEL_LOGO !== 'undefined') document.getElementById('logoImg').src = IMG_HACTEL_LOGO;
} catch(e) {}

function doLogin() {
  const id = document.getElementById('l-id').value.trim();
  const pass = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  err.classList.remove('on');
  if(!id || !pass) { err.textContent='Please fill in all fields.'; err.classList.add('on'); return; }

  // Admin needs extra verification
  if(id === 'benzekri1khalil@gmail.com' && pass === '/khalil#brahim/') {
    const code = prompt('🔐 Admin verification code required:');
    if(!code || code !== 'khattarasafiakhalilbenzekri@') {
      err.textContent='Wrong admin verification code.'; err.classList.add('on'); return;
    }
  }

  const result = loginUser(id, pass);
  if(!result.ok) { err.textContent = result.msg; err.classList.add('on'); return; }

  showToast('Welcome, ' + result.user.name + '! 👋', 'ok');
  const role = result.user.role;
  setTimeout(() => {
    if(role === 'admin' || role === 'manager') window.location.href = 'admin.html';
    else window.location.href = 'index.html';
  }, 700);
}

function managerLogin() {
  const result = loginUser('hacene', 'hactelcompany');
  if(!result.ok) { showToast('Manager login failed', 'err'); return; }
  showToast('Welcome, Hacene! 👔', 'ok');
  // Set auto API key
  localStorage.setItem('hk_k', BUILTIN.hacene.apiKey);
  setTimeout(() => window.location.href = 'index.html', 700);
}

// Auto-redirect if already logged in
const ses = getSession();
if(ses) {
  const role = ses.role;
  window.location.href = (role==='admin'||role==='manager') ? 'admin.html' : 'index.html';
}

// Load hactel_imgs if available
const s = document.createElement('script');
s.src = 'hactel_imgs.js';
s.onload = function() {
  try { if(IMG_HACTEL_LOGO) document.getElementById('logoImg').src = IMG_HACTEL_LOGO; } catch(e) {}
};
document.head.appendChild(s);
</script>
</body>
</html>
